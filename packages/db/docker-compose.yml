name: bmhkms-db

services:
  postgres:
    image: postgres:17
    container_name: bmhkms-postgres
    environment:
      POSTGRES_DB: bmhkms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - bmhkms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  bmhkms_postgres_data:
